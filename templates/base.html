<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ELP{% endblock %} | Experiential Learning Program</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; font-family: system-ui, sans-serif; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.3px; }
    .project-card { border-left: 3px solid #0d6efd; transition: box-shadow .15s; }
    .project-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
    .badge-industry { background: #dbeafe; color: #1d4ed8; font-weight: 500; }
    .badge-type     { background: #dcfce7; color: #166534; font-weight: 500; }
    .collapsible-text { max-height: 72px; overflow: hidden; position: relative; }
    .collapsible-text.expanded { max-height: none; }
    .collapsible-text:not(.expanded)::after {
      content: ""; position: absolute; bottom: 0; left: 0; right: 0;
      height: 28px; background: linear-gradient(transparent, #fff);
    }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .ts-wrapper { min-height: 38px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">ELP 2027</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="navbar-nav ms-auto gap-3 align-items-center">
        {% if user_email %}
          <div class="d-flex align-items-center gap-2 text-white-50">
            <span class="small">Logged in as <strong>{{ user_name }}</strong> ({{ user_email }})</span>
          </div>
          {% if user_token %}
            <a class="btn btn-outline-info btn-sm text-white px-3" href="/submit/{{ user_token }}">My Group ({{ user_group_id }})</a>
          {% else %}
            <a class="btn btn-primary btn-sm text-white px-3" href="/register">Register My Team</a>
          {% endif %}
          <a class="btn btn-outline-danger btn-sm px-2" href="/logout" style="font-size: 11px;">Logout</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
